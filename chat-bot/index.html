<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarita - Asistente de Cursos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; }

        /* ---- BOTÓN FLOTANTE ---- */
        #chat-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #2563EB;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(37, 99, 235, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 9999;
        }
        #chat-toggle:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.55);
        }
        #chat-toggle svg { width: 26px; height: 26px; fill: white; }

        /* ---- WIDGET ---- */
        #chat-widget {
            position: fixed;
            bottom: 96px;
            right: 24px;
            width: 368px;
            height: 560px;
            background: #ffffff;
            border-radius: 22px;
            box-shadow: 0 10px 48px rgba(0, 0, 0, 0.13), 0 2px 10px rgba(0, 0, 0, 0.07);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 9998;
            transform: scale(0.88) translateY(24px);
            opacity: 0;
            pointer-events: none;
            transform-origin: bottom right;
            transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease;
        }
        #chat-widget.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        /* ---- HEADER ---- */
        .chat-header {
            background: #2563EB;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .header-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            border: 1.5px solid rgba(255,255,255,0.3);
        }
        .header-info { flex: 1; }
        .header-name { font-size: 0.95rem; font-weight: 600; color: white; line-height: 1.2; }
        .header-status {
            font-size: 0.73rem;
            color: rgba(255, 255, 255, 0.78);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
        }
        .header-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.65;
            transition: opacity 0.15s;
            border-radius: 6px;
        }
        .header-close { background: none; border: none; cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; opacity: 0.72; transition: opacity 0.15s, background 0.15s; border-radius: 50%; }
        .header-close:hover { opacity: 1; background: rgba(255,255,255,0.18); }
        .header-close svg { width: 17px; height: 17px; stroke: white; fill: none; stroke-width: 2.8; stroke-linecap: round; }

        /* botón reiniciar — mismo estilo base que header-close */
        .header-reset { background: none; border: none; cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; opacity: 0.72; transition: opacity 0.15s, background 0.15s; border-radius: 50%; }
        .header-reset:hover { opacity: 1; background: rgba(255,255,255,0.18); }
        .header-reset svg { width: 17px; height: 17px; stroke: white; fill: none; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }

        /* ---- AUTH PANEL ---- */
        #auth-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 24px;
            gap: 12px;
            text-align: center;
        }
        .auth-emoji { font-size: 2.8rem; line-height: 1; }
        .auth-title { font-size: 1.05rem; font-weight: 600; color: #111827; margin-top: 4px; }
        .auth-subtitle { font-size: 0.84rem; color: #6b7280; line-height: 1.55; max-width: 260px; }
        .auth-divider {
            width: 100%;
            max-width: 260px;
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 4px 0;
        }

        /* ---- CHAT PANEL ---- */
        #chat-panel {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        /* ---- MENSAJES ---- */
        #messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        #messages-area::-webkit-scrollbar { width: 4px; }
        #messages-area::-webkit-scrollbar-track { background: transparent; }
        #messages-area::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }

        .time-divider {
            text-align: center;
            font-size: 0.72rem;
            color: #9ca3af;
            padding: 4px 0 2px;
            user-select: none;
        }

        /* ---- BURBUJAS ---- */
        .bubble-row {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        .bubble-row.user { flex-direction: row-reverse; }

        .bubble-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.68rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .bubble-row.agent .bubble-avatar { background: #dbeafe; color: #2563EB; }
        .bubble-row.user   .bubble-avatar { background: #ede9fe; color: #7c3aed; }
        .chat-avatar-img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            flex-shrink: 0;
        }

        /* ---- AVATAR PULSE (Clarita pensando) ---- */
        @keyframes avatarPulse {
            0%, 100% { opacity: 1;   transform: scale(1);    }
            50%       { opacity: 0.55; transform: scale(0.92); }
        }
        .avatar-pulse {
            animation: avatarPulse 1.6s ease-in-out infinite;
        }

        .bubble {
            max-width: 78%;
            padding: 9px 13px;
            border-radius: 18px;
            font-size: 0.875rem;
            line-height: 1.58;
            word-break: break-word;
        }
        .bubble-row.user  .bubble {
            background: #2563EB;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bubble-row.agent .bubble {
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
        }
        .bubble-row.system {
            justify-content: center;
        }
        .bubble-row.system .bubble {
            background: #fef9c3;
            color: #854d0e;
            border-radius: 10px;
            font-size: 0.81rem;
            max-width: 88%;
            text-align: center;
        }

        /* ---- TYPING INDICATOR ---- */
        .typing-bubble {
            background: #f1f5f9;
            padding: 11px 14px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #94a3b8;
            animation: typingBounce 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-dot:nth-child(3) { animation-delay: 0.36s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0);    opacity: 0.45; }
            30%           { transform: translateY(-7px); opacity: 1;    }
        }

        /* ---- INPUT AREA ---- */
        .chat-input-area {
            padding: 10px 12px 12px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            flex-shrink: 0;
        }
        #messageInput {
            flex: 1;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            padding: 9px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            outline: none;
            color: #1e293b;
            background: #f8fafc;
            transition: border-color 0.2s, background 0.2s;
        }
        #messageInput:focus  { border-color: #2563EB; background: #fff; }
        #messageInput:disabled { background: #f1f5f9; cursor: not-allowed; color: #94a3b8; }
        #messageInput::placeholder { color: #94a3b8; }

        #sendBtn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #2563EB;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
        }
        #sendBtn:hover:not(:disabled) { background: #1d4ed8; transform: scale(1.06); }
        #sendBtn:disabled { background: #cbd5e1; cursor: not-allowed; }
        #sendBtn svg { width: 17px; height: 17px; fill: white; }

        /* ---- LINK CTA ---- */
        .chat-action-link {
            display: inline-block;
            margin: 4px 2px 2px;
            padding: 5px 12px;
            background: #2563EB;
            color: #fff !important;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            text-decoration: none;
            line-height: 1.4;
            transition: background 0.15s, transform 0.12s;
        }
        .chat-action-link:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        /* ---- LISTAS DENTRO DE BURBUJAS ---- */
        .bubble ul { margin: 6px 0 2px; padding-left: 18px; display: flex; flex-direction: column; gap: 3px; }
        .bubble ul li { font-size: 0.875rem; line-height: 1.55; }

        /* ---- CHIPS DE SUGERENCIAS ---- */
        #suggestions {
            padding: 8px 12px 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border-top: 1px solid #f1f5f9;
            background: #fff;
            flex-shrink: 0;
        }
        #suggestions.hidden { display: none; }
        .chip {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 7px 12px;
            margin-bottom: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            line-height: 1.45;
            cursor: pointer;
            white-space: normal;
            text-align: left;
            width: 100%;
            height: auto;
            transition: background 0.15s, border-color 0.15s, transform 0.12s;
        }
        .chip:hover {
            background: #dbeafe;
            border-color: #93c5fd;
            color: #1d4ed8;
            transform: translateY(-1px);
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 430px) {
            #chat-widget  { width: calc(100vw - 20px); right: 10px; bottom: 82px; height: 72vh; border-radius: 18px; }
            #chat-toggle  { right: 14px; bottom: 14px; }
        }
    </style>
</head>
<body>

<!-- ========== BOTÓN FLOTANTE ========== -->
<button id="chat-toggle" title="Hablar con Clarita" onclick="toggleChat()">
    <svg viewBox="0 0 24 24"><path d="M20 2H4C2.897 2 2 2.897 2 4v18l4-4h14c1.103 0 2-.897 2-2V4c0-1.103-.897-2-2-2zm-3 10H7v-2h10v2zm0-4H7V6h10v2z"/></svg>
</button>

<!-- ========== WIDGET ========== -->
<div id="chat-widget">

    <!-- Header -->
    <div class="chat-header">
        <div class="header-avatar">C</div>
        <div class="header-info">
            <div class="header-name">Clarita</div>
            <div class="header-status"><span class="status-dot"></span> En línea</div>
        </div>
        <!-- Botón reiniciar conversación -->
        <button class="header-reset" onclick="resetConversation()" title="Reiniciar conversación">
            <!-- Ícono refrescar (flecha circular) -->
            <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        </button>
        <button class="header-close" onclick="toggleChat()" title="Cerrar">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>

    <!-- Auth Panel -->
    <div id="auth-panel">
        <div class="auth-emoji">👋</div>
        <div class="auth-title">Hola, soy Clarita</div>
        <div class="auth-subtitle">Tu asistente para cursos. Inicia sesión para comenzar a chatear.</div>
        <hr class="auth-divider">
        <div id="g_id_onload"
             data-client_id="877226735670-ut216nfhr4jc20lc4iaslo4jg26tmimu.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-shape="rectangular" data-theme="outline"></div>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel">
        <div id="messages-area">
            <div class="time-divider">Hoy · Inicio de conversación</div>
            <div class="bubble-row agent">
                <div class="bubble-avatar">C</div>
                <div class="bubble" id="welcome-bubble">¡Hola! 👋 Soy Clarita, tu asistente de cursos. ¿En qué puedo ayudarte hoy?</div>
            </div>
        </div>
        <!-- Chips de sugerencias -->
        <div id="suggestions">
            <button class="chip" onclick="useChip(this)">Recomiéndame un pack de cursos ya que me dedico a ________</button>
            <button class="chip" onclick="useChip(this)">Recomiéndame unos cursos relacionados a ________</button>
            <button class="chip" onclick="useChip(this)">Tengo un problema con ________</button>
            <button class="chip" onclick="useChip(this)">¿Qué es la opción de monetizar?</button>
        </div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." autocomplete="off" spellcheck="true">
            <button id="sendBtn" title="Enviar">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

</div>

<script>
    let userEmail    = "";
    let userName     = "";
    let userFirstName = "";
    let userPhotoUrl = "";
    let isLoading    = false;

    /* ---- JWT decoder ---- */
    function parseJwt(token) {
        const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(decodeURIComponent(
            atob(b64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
        ));
    }

    /* ---- Google Auth ---- */
    function handleCredentialResponse(response) {
        const data   = parseJwt(response.credential);
        userEmail    = data.email;
        userName     = data.name;
        userPhotoUrl = data.picture || "";

        // Nombre de pila: usar given_name de Google o las primeras dos palabras del nombre completo
        // (cubre nombres compuestos comunes en Latinoamérica, ej. "Evan Cecilia")
        const givenName = data.given_name || data.name.split(' ').slice(0, 2).join(' ');
        userFirstName   = capitalize(givenName);

        // Actualizar burbuja de bienvenida con el nombre personalizado
        const wb = document.getElementById('welcome-bubble');
        if (wb) wb.innerHTML = `¡Hola! <strong>${userFirstName}</strong> 👋 Soy Clarita, tu asistente de cursos. ¿En qué puedo ayudarte hoy?`;

        document.getElementById('auth-panel').style.display  = 'none';
        const panel = document.getElementById('chat-panel');
        panel.style.display        = 'flex';
        panel.style.flex           = '1';
        panel.style.flexDirection  = 'column';
        panel.style.overflow       = 'hidden';
        document.getElementById('messageInput').focus();
    }

    /* Capitaliza la primera letra de cada palabra */
    function capitalize(str) {
        return str.replace(/\b\w/g, c => c.toUpperCase());
    }

    /* ---- Toggle widget ---- */
    function toggleChat() {
        document.getElementById('chat-widget').classList.toggle('open');
    }

    /* ---- UI helpers ---- */
    function setLoading(state) {
        isLoading = state;
        document.getElementById('messageInput').disabled = state;
        document.getElementById('sendBtn').disabled      = state;
    }

    function scrollToBottom() {
        const area = document.getElementById('messages-area');
        area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
    }

    function addBubble(type, html) {
        const area = document.getElementById('messages-area');
        const row  = document.createElement('div');
        row.className = `bubble-row ${type}`;

        if (type === 'system') {
            row.innerHTML = `<div class="bubble">${html}</div>`;
        } else {
            const inicial = userName ? userName.charAt(0).toUpperCase() : 'U';

            // Lógica de avatar: img si hay URL válida, div con inicial si no
            let avatarHTML;
            if (type === 'user') {
                avatarHTML = (userPhotoUrl && userPhotoUrl.trim() !== '')
                    ? `<img src="${userPhotoUrl}" alt="Avatar" class="chat-avatar-img">`
                    : `<div class="bubble-avatar">${inicial}</div>`;
            } else {
                avatarHTML = `<div class="bubble-avatar">C</div>`;
            }

            row.innerHTML = `${avatarHTML}<div class="bubble">${html}</div>`;
        }

        area.appendChild(row);
        scrollToBottom();
        return row;
    }

    function showTyping() {
        const area = document.getElementById('messages-area');
        const row  = document.createElement('div');
        row.id        = 'typing-indicator';
        row.className = 'bubble-row agent';
        row.innerHTML = `
            <div class="bubble-avatar">C</div>
            <div class="typing-bubble">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>`;
        area.appendChild(row);
        scrollToBottom();
        // Pulsar el avatar de Clarita en el header mientras piensa
        document.querySelector('.header-avatar')?.classList.add('avatar-pulse');
    }

    function hideTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
        // Detener el pulso del avatar del header
        document.querySelector('.header-avatar')?.classList.remove('avatar-pulse');
    }

    /* ---- Chips de sugerencias ---- */
    function useChip(btn) {
        const input = document.getElementById('messageInput');
        const text  = btn.textContent;
        input.value = text;
        input.focus();

        // Si hay guiones bajos, seleccionarlos para reemplazo inmediato al escribir
        const start = text.indexOf('________');
        if (start !== -1) {
            input.setSelectionRange(start, start + 8);
        }
    }

    function hideChips() {
        document.getElementById('suggestions').classList.add('hidden');
    }

    /* ---- Bloquear drag/drop e imágenes pegadas ---- */
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('messageInput');

        input.addEventListener('paste', (e) => {
            const items = Array.from(e.clipboardData?.items || []);
            if (items.some(i => i.type.startsWith('image/'))) { e.preventDefault(); return; }
        });
        input.addEventListener('drop',     (e) => e.preventDefault());
        input.addEventListener('dragover', (e) => e.preventDefault());

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isLoading) sendMessage(); }
        });

        document.getElementById('sendBtn').addEventListener('click', () => { if (!isLoading) sendMessage(); });
    });

    /* ---- Enviar mensaje ---- */
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text  = input.value.trim();
        if (!text || isLoading) return;

        input.value = '';
        hideChips();
        addBubble('user', escapeHtml(text));
        setLoading(true);
        showTyping();

        const payload = {
            instancia: { nombre: "Web_Chat", apikey: "none", server_url: "web" },
            message: {
                id:           crypto.randomUUID(),
                chat_id:      userEmail,
                username:     userName,
                content:      text,
                content_type: "texto",
                timestamp:    new Date().toISOString()
            }
        };

        try {
            const response = await fetch(
                "https://personal-n8n.85wqxz.easypanel.host/webhook-test/46c87db9-da2e-4c79-9f26-f77bd4d86be6",
                { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }
            );

            hideTyping();

            if (response.ok) {
                const data = await response.json();
                if (data.output) { addBubble('agent', parseMarkdown(data.output)); playNotif(); }
            } else {
                addBubble('system', 'Lo siento, tuve un problema de conexión. ¿Podrías intentar enviar tu mensaje de nuevo?');
            }
        } catch {
            hideTyping();
            addBubble('system', 'Lo siento, tuve un problema de conexión. ¿Podrías intentar enviar tu mensaje de nuevo?');
        } finally {
            setLoading(false);
            document.getElementById('messageInput').focus();
        }
    }

    /* ---- Escape HTML para prevenir XSS ---- */
    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    /* ---- Sonido de notificación ---- */
    // Reemplaza la URL por tu propio archivo .mp3 si lo deseas
    const notifAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
    notifAudio.volume = 0.35;
    function playNotif() {
        notifAudio.currentTime = 0;
        notifAudio.play().catch(() => {}); // silencia el error si el navegador bloquea autoplay
    }

    /* ---- Reiniciar conversación ---- */
    async function resetConversation() {
        if (!confirm('¿Reiniciar la conversación y borrar la memoria de Clarita?')) return;

        // Limpiar UI
        const area = document.getElementById('messages-area');
        area.innerHTML = `
            <div class="time-divider">Hoy · Conversación reiniciada</div>
            <div class="bubble-row agent">
                <div class="bubble-avatar">C</div>
                <div class="bubble">Conversación reiniciada. ¿En qué puedo ayudarte? 😊</div>
            </div>`;

        // Mostrar chips de nuevo
        document.getElementById('suggestions').classList.remove('hidden');

        // ── WEBHOOK DE RESET ──────────────────────────────────────────────────
        // Puedes usar la misma URL del webhook principal y filtrar por "action"
        // en n8n con un nodo IF, o crear un webhook dedicado para el reset.

    /* ---- Parser de Markdown para respuestas de la IA ---- */
    function parseMarkdown(str) {
        // 1. Escapar HTML primero para prevenir XSS
        let html = escapeHtml(str);

        // 2. Negritas: **texto** → <strong>texto</strong>
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

        // 3. Listas: líneas que empiezan con "- " o "* " → <ul><li>
        //    Agrupa líneas contiguas de lista en un único <ul>
        html = html.replace(/((?:^|\n)[*-] .+)+/g, (block) => {
            const items = block.trim().split('\n').map(line =>
                `<li>${line.replace(/^[*-] /, '').trim()}</li>`
            ).join('');
            return `<ul>${items}</ul>`;
        });

        // 4. Saltos de línea: \n restantes → <br> (después de procesar listas)
        html = html.replace(/\n/g, '<br>');

        // 5. URLs → botón CTA
        html = html.replace(
            /(https?:\/\/[^\s<>"']+)/g,
            '<a href="$1" target="_blank" rel="noopener noreferrer" class="chat-action-link">$1</a>'
        );

        return html;
    }
